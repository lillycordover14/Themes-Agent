<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smith Point — Themes Radar</title>
<style>:root{color-scheme:light}*{box-sizing:border-box}html,body{height:100%}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#14213d;display:flex;align-items:center;justify-content:center}
.box{background:#fff;color:#14213d;padding:30px 32px 26px;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.35);width:330px;text-align:center}
.mk{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,#14213d,#33517f);color:#fff;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.box h1{font-size:17px;margin:0 0 3px;letter-spacing:-.2px}.box p{font-size:12px;color:#5b6b7c;margin:0 0 16px}
.box input{width:100%;padding:11px 12px;border:1px solid #d8dde7;border-radius:8px;font-size:14px;margin-bottom:10px}
.box button{width:100%;padding:11px;border:none;border-radius:8px;background:#33517f;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.er{color:#b23b3b;font-size:12px;margin-top:9px;min-height:14px}</style></head>
<body><div class="box"><div class="mk">SP</div><h1>Themes &amp; Tailwind Radar</h1><p>Smith Point Capital — enter password to continue</p>
<form id="f"><input id="p" type="password" autofocus placeholder="Password" autocomplete="current-password"><button type="submit">Unlock</button><div class="er" id="er"></div></form></div>
<script>
var H="1d5aaaa4c93515f767b7fe618476505c1bfefdb92db1625648f46e3c431a16a8",P="__PAYLOAD__";
function reveal(){var bin=atob(P),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);var html=new TextDecoder("utf-8").decode(u);document.open();document.write(html);document.close();}
async function sha(t){var b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(t));return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,"0");}).join("");}
try{if(sessionStorage.getItem("spok")==="1"){reveal();}}catch(e){}
document.getElementById("f").addEventListener("submit",async function(e){e.preventDefault();var h=await sha(document.getElementById("p").value);if(h===H){try{sessionStorage.setItem("spok","1");}catch(e){}reveal();}else{document.getElementById("er").textContent="Incorrect password";}});
</script></body></html>
